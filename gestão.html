<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMS - Gestão Logística Profissional</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#0f172a;
    --secondary:#1e293b;
    --accent:#00ff88;
    --danger:#ff4d4d;
    --light:#f1f5f9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    background:var(--primary);
    color:var(--light);
}

/* MENU */
.sidebar{
    width:240px;
    height:100vh;
    background:var(--secondary);
    padding:20px;
    position:fixed;
}

.sidebar h2{
    color:var(--accent);
    margin-bottom:30px;
}

.sidebar button{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    background:none;
    border:1px solid var(--accent);
    color:var(--light);
    cursor:pointer;
    transition:0.3s;
}

.sidebar button:hover{
    background:var(--accent);
    color:black;
}

/* CONTEÚDO */
.main{
    margin-left:240px;
    padding:30px;
    width:100%;
}

.section{
    display:none;
}

.active{
    display:block;
}

/* DASHBOARD */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:var(--secondary);
    padding:20px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card h3{
    color:var(--accent);
}

/* FORM */
form{
    background:var(--secondary);
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}

button.submit{
    background:var(--accent);
    color:black;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    padding:10px;
    border-bottom:1px solid #334155;
    text-align:left;
}

.low{
    color:var(--danger);
    font-weight:bold;
}

/* RESPONSIVO */
@media(max-width:768px){
    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }
    .main{
        margin-left:0;
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>WMS Pro</h2>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('produtos')">Produtos</button>
    <button onclick="showSection('entrada')">Entrada</button>
    <button onclick="showSection('saida')">Saída</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
    <h1>Dashboard Logístico</h1>
    <div class="cards">
        <div class="card">
            <h3>Total Produtos</h3>
            <p id="totalProdutos">0</p>
        </div>
        <div class="card">
            <h3>Total em Estoque</h3>
            <p id="totalEstoque">0</p>
        </div>
        <div class="card">
            <h3>Estoque Baixo</h3>
            <p id="estoqueBaixo">0</p>
        </div>
    </div>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="section">
    <h1>Cadastro de Produtos</h1>

    <form onsubmit="addProduto(event)">
        <input type="text" id="nome" placeholder="Nome do Produto" required>
        <input type="number" id="minimo" placeholder="Estoque Mínimo" required>
        <input type="text" id="rua" placeholder="Rua" required>
        <input type="text" id="predio" placeholder="Prédio" required>
        <input type="text" id="andar" placeholder="Andar" required>
        <input type="text" id="posicao" placeholder="Posição" required>
        <button class="submit">Cadastrar Produto</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>SKU</th>
                <th>Produto</th>
                <th>Estoque</th>
                <th>Mínimo</th>
                <th>Endereço</th>
            </tr>
        </thead>
        <tbody id="listaProdutos"></tbody>
    </table>
</div>

<!-- ENTRADA -->
<div id="entrada" class="section">
    <h1>Entrada de Mercadorias</h1>
    <form onsubmit="entradaEstoque(event)">
        <input type="text" id="skuEntrada" placeholder="SKU do Produto" required>
        <input type="number" id="qtdEntrada" placeholder="Quantidade" required>
        <button class="submit">Registrar Entrada</button>
    </form>
</div>

<!-- SAÍDA -->
<div id="saida" class="section">
    <h1>Saída / Expedição</h1>
    <form onsubmit="saidaEstoque(event)">
        <input type="text" id="skuSaida" placeholder="SKU do Produto" required>
        <input type="number" id="qtdSaida" placeholder="Quantidade" required>
        <button class="submit">Registrar Saída</button>
    </form>
</div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

function save(){
    localStorage.setItem("produtos", JSON.stringify(produtos));
    render();
}

function showSection(id){
    document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function gerarSKU(){
    return "SKU" + Math.floor(Math.random()*100000);
}

function addProduto(e){
    e.preventDefault();
    let produto = {
        sku: gerarSKU(),
        nome: nome.value,
        minimo: parseInt(minimo.value),
        estoque: 0,
        endereco: `${rua.value} / ${predio.value} / ${andar.value} / ${posicao.value}`
    };
    produtos.push(produto);
    save();
    e.target.reset();
}

function entradaEstoque(e){
    e.preventDefault();
    let sku = skuEntrada.value;
    let qtd = parseInt(qtdEntrada.value);
    let prod = produtos.find(p=>p.sku===sku);
    if(prod){
        prod.estoque += qtd;
        save();
        alert("Entrada registrada!");
    }else{
        alert("Produto não encontrado!");
    }
    e.target.reset();
}

function saidaEstoque(e){
    e.preventDefault();
    let sku = skuSaida.value;
    let qtd = parseInt(qtdSaida.value);
    let prod = produtos.find(p=>p.sku===sku);
    if(prod && prod.estoque >= qtd){
        prod.estoque -= qtd;
        save();
        alert("Saída registrada!");
    }else{
        alert("Estoque insuficiente ou produto não encontrado!");
    }
    e.target.reset();
}

function render(){
    listaProdutos.innerHTML="";
    let totalEstoque=0;
    let baixo=0;

    produtos.forEach(p=>{
        totalEstoque+=p.estoque;
        if(p.estoque <= p.minimo) baixo++;

        listaProdutos.innerHTML+=`
            <tr>
                <td>${p.sku}</td>
                <td>${p.nome}</td>
                <td class="${p.estoque <= p.minimo ? 'low':''}">${p.estoque}</td>
                <td>${p.minimo}</td>
                <td>${p.endereco}</td>
            </tr>
        `;
    });

    totalProdutos.innerText = produtos.length;
    totalEstoque.innerText = totalEstoque;
    estoqueBaixo.innerText = baixo;
}

render();

</script>

</body>
</html>
