<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMS Enterprise Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#00ff88;
--danger:#ff4d4d;
--text:#f1f5f9;
--muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:var(--bg);color:var(--text);display:flex;}

.sidebar{
width:250px;
background:var(--card);
height:100vh;
padding:25px;
position:fixed;
}

.sidebar h2{color:var(--accent);margin-bottom:30px;}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:12px;
background:transparent;
border:1px solid var(--accent);
color:var(--text);
cursor:pointer;
transition:.3s;
border-radius:6px;
}

.sidebar button:hover{
background:var(--accent);
color:#000;
}

.main{
margin-left:250px;
padding:40px;
width:100%;
}

.section{display:none;}
.active{display:block;}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:var(--card);
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

.card h3{color:var(--accent);font-size:16px;}
.card p{font-size:22px;font-weight:bold;margin-top:10px;}

form{
background:var(--card);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

button.submit{
background:var(--accent);
border:none;
padding:10px;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:var(--card);
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

.low{color:var(--danger);font-weight:bold;}

.chart-box{
background:var(--card);
padding:20px;
border-radius:12px;
margin-top:20px;
}

.export-btn{
background:#2563eb;
margin-top:15px;
}

@media(max-width:768px){
.sidebar{position:relative;width:100%;height:auto;}
.main{margin-left:0;}
}
</style>
</head>
<body>

<div class="sidebar">
<h2>WMS Enterprise</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('produtos')">Produtos</button>
<button onclick="show('entrada')">Entrada</button>
<button onclick="show('saida')">Saída</button>
</div>

<div class="main">

<div id="dashboard" class="section active">
<h1>Dashboard Analítico</h1>

<select id="filtroAno" onchange="atualizarGraficos()"></select>

<div class="cards">
<div class="card"><h3>Total Produtos</h3><p id="totalProdutos">0</p></div>
<div class="card"><h3>Total Estoque</h3><p id="totalEstoque">0</p></div>
<div class="card"><h3>Previsão Próx. Mês</h3><p id="previsao">0</p></div>
</div>

<div class="chart-box">
<canvas id="graficoMovimentacao"></canvas>
</div>

<div class="chart-box">
<canvas id="graficoCrescimento"></canvas>
</div>

<button class="submit export-btn" onclick="exportarExcel()">Exportar Excel</button>

</div>

<div id="produtos" class="section">
<h1>Produtos</h1>
<form onsubmit="addProduto(event)">
<input type="text" id="nome" placeholder="Nome" required>
<input type="number" id="minimo" placeholder="Estoque Mínimo" required>
<button class="submit">Cadastrar</button>
</form>
<table>
<thead>
<tr><th>SKU</th><th>Nome</th><th>Estoque</th></tr>
</thead>
<tbody id="listaProdutos"></tbody>
</table>
</div>

<div id="entrada" class="section">
<h1>Entrada</h1>
<form onsubmit="movimentar(event,'entrada')">
<input type="text" id="skuMov" placeholder="SKU" required>
<input type="number" id="qtdMov" placeholder="Quantidade" required>
<button class="submit">Registrar</button>
</form>
</div>

<div id="saida" class="section">
<h1>Saída</h1>
<form onsubmit="movimentar(event,'saida')">
<input type="text" id="skuMov" placeholder="SKU" required>
<input type="number" id="qtdMov" placeholder="Quantidade" required>
<button class="submit">Registrar</button>
</form>
</div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos"))||[];
let movimentacoes = JSON.parse(localStorage.getItem("movimentacoes"))||[];
let grafico1,grafico2;

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function gerarSKU(){return "SKU"+Math.floor(Math.random()*100000);}

function salvar(){
localStorage.setItem("produtos",JSON.stringify(produtos));
localStorage.setItem("movimentacoes",JSON.stringify(movimentacoes));
render();
atualizarGraficos();
}

function addProduto(e){
e.preventDefault();
produtos.push({sku:gerarSKU(),nome:nome.value,estoque:0,minimo:minimo.value});
salvar();
e.target.reset();
}

function movimentar(e,tipo){
e.preventDefault();
let sku=document.getElementById("skuMov").value;
let qtd=parseInt(document.getElementById("qtdMov").value);
let prod=produtos.find(p=>p.sku===sku);
if(prod){
if(tipo==="saida" && prod.estoque<qtd){alert("Estoque insuficiente");return;}
prod.estoque += tipo==="entrada"?qtd:-qtd;
movimentacoes.push({tipo,quantidade:qtd,data:new Date()});
salvar();
}
e.target.reset();
}

function calcularMensal(tipo,ano){
let meses=Array(12).fill(0);
movimentacoes.forEach(m=>{
let d=new Date(m.data);
if(m.tipo===tipo && d.getFullYear()==ano){
meses[d.getMonth()]+=m.quantidade;
}
});
return meses;
}

function crescimentoPercentual(arr){
let result=[];
for(let i=0;i<12;i++){
if(i===0||arr[i-1]===0) result.push(0);
else result.push(((arr[i]-arr[i-1])/arr[i-1]*100).toFixed(1));
}
return result;
}

function previsaoEstoque(ano){
let entradas=calcularMensal("entrada",ano);
let media=entradas.reduce((a,b)=>a+b,0)/12;
document.getElementById("previsao").innerText=Math.round(media);
}

function atualizarGraficos(){
let ano=document.getElementById("filtroAno").value;
let entradas=calcularMensal("entrada",ano);
let saidas=calcularMensal("saida",ano);
let crescimento=crescimentoPercentual(entradas);

if(grafico1)grafico1.destroy();
if(grafico2)grafico2.destroy();

grafico1=new Chart(graficoMovimentacao,{
type:"bar",
data:{labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[
{label:"Entradas",data:entradas,backgroundColor:"#00ff88"},
{label:"Saídas",data:saidas,backgroundColor:"#ff4d4d"}
]},
options:{responsive:true}
});

grafico2=new Chart(graficoCrescimento,{
type:"line",
data:{labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[{label:"% Crescimento Entradas",data:crescimento,borderColor:"#2563eb"}]},
options:{responsive:true}
});

previsaoEstoque(ano);
}

function render(){
listaProdutos.innerHTML="";
let total=0;
produtos.forEach(p=>{
total+=p.estoque;
listaProdutos.innerHTML+=`<tr>
<td>${p.sku}</td>
<td>${p.nome}</td>
<td class="${p.estoque<=p.minimo?'low':''}">${p.estoque}</td>
</tr>`;
});
totalProdutos.innerText=produtos.length;
totalEstoque.innerText=total;
}

function exportarExcel(){
let csv="SKU,Nome,Estoque\n";
produtos.forEach(p=>{
csv+=`${p.sku},${p.nome},${p.estoque}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="wms_export.csv";
link.click();
}

function carregarAnos(){
let anos=[...new Set(movimentacoes.map(m=>new Date(m.data).getFullYear()))];
if(anos.length===0) anos=[new Date().getFullYear()];
filtroAno.innerHTML="";
anos.forEach(a=>{
filtroAno.innerHTML+=`<option value="${a}">${a}</option>`;
});
}

carregarAnos();
render();
atualizarGraficos();

</script>

</body>
</html>
