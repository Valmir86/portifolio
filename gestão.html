<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMS Logística Profissional</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#22c55e;
--blue:#3b82f6;
--danger:#ef4444;
--text:#f1f5f9;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{display:flex;background:var(--bg);color:var(--text);}
.sidebar{width:260px;background:var(--card);height:100vh;padding:25px;position:fixed;overflow:auto;}
.sidebar h2{color:var(--accent);margin-bottom:20px;}
.sidebar button{width:100%;padding:10px;margin-bottom:10px;border:none;background:transparent;border:1px solid var(--accent);color:var(--text);cursor:pointer;border-radius:6px;transition:.3s;}
.sidebar button:hover{background:var(--accent);color:#000;}
.main{margin-left:260px;padding:30px;width:100%;}
.section{display:none;}
.active{display:block;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:25px;}
.card{background:var(--card);padding:20px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.card h3{color:var(--accent);}
.card p{font-size:22px;font-weight:bold;margin-top:10px;}
form{background:var(--card);padding:20px;border-radius:10px;margin-bottom:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
input,select{padding:8px;border:none;border-radius:5px;}
button.submit{background:var(--accent);border:none;padding:8px;font-weight:bold;cursor:pointer;border-radius:5px;}
table{width:100%;border-collapse:collapse;background:var(--card);margin-top:15px;}
th,td{padding:8px;border-bottom:1px solid #334155;text-align:center;}
.chart-box{background:var(--card);padding:20px;border-radius:10px;margin-top:20px;}
.export-btn{background:var(--blue);margin-top:15px;}
@media(max-width:768px){.sidebar{position:relative;width:100%;height:auto;}.main{margin-left:0;}}
</style>
</head>
<body>

<div class="sidebar">
<h2>WMS Logística</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('cadastro')">Cadastro Produto</button>
<button onclick="show('saida')">Saída / Expedição</button>
<button onclick="show('relatorios')">Relatórios</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h1>Dashboard Geral</h1>

<div class="cards">
<div class="card"><h3>Total Produtos</h3><p id="totalProdutos">0</p></div>
<div class="card"><h3>Quantidade Total</h3><p id="totalQuantidade">0</p></div>
<div class="card"><h3>Valor Total Estoque</h3><p id="valorTotal">0</p></div>
</div>

<div class="chart-box">
<canvas id="graficoMensal"></canvas>
</div>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="section">
<h1>Cadastro de Produto</h1>

<form onsubmit="cadastrarProduto(event)">
<input type="text" id="sku" placeholder="SKU" required>
<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="cor" placeholder="Cor" required>
<input type="number" id="valor" placeholder="Valor Unitário" required>
<input type="number" id="quantidade" placeholder="Quantidade" required>
<input type="text" id="rua" placeholder="Rua" required>
<input type="text" id="predio" placeholder="Prédio" required>
<input type="text" id="andar" placeholder="Andar" required>
<input type="date" id="entrada" required>
<button class="submit">Salvar</button>
</form>

<table>
<thead>
<tr>
<th>SKU</th><th>Nome</th><th>Cor</th><th>Qtd</th><th>Valor</th>
<th>Rua</th><th>Prédio</th><th>Andar</th>
<th>Entrada</th><th>Saída</th>
</tr>
</thead>
<tbody id="listaProdutos"></tbody>
</table>

<button class="submit export-btn" onclick="exportarExcel()">Exportar Produtos Excel</button>
</div>

<!-- SAÍDA -->
<div id="saida" class="section">
<h1>Saída / Expedição</h1>

<form onsubmit="registrarSaida(event)">
<input type="text" id="saidaSku" placeholder="SKU" required>
<input type="number" id="saidaQuantidade" placeholder="Quantidade" required>
<input type="text" id="pedido" placeholder="Pedido" required>
<input type="text" id="transportadora" placeholder="Transportadora" required>
<input type="date" id="dataSaida" required>
<button class="submit">Registrar Saída</button>
</form>

<table>
<thead>
<tr>
<th>SKU</th><th>Pedido</th><th>Transportadora</th>
<th>Qtd</th><th>Data</th>
</tr>
</thead>
<tbody id="listaSaidas"></tbody>
</table>

<button class="submit export-btn" onclick="exportarSaidas()">Exportar Saídas Excel</button>
</div>

<!-- RELATÓRIOS -->
<div id="relatorios" class="section">
<h1>Relatórios</h1>

<select id="filtroTipo" onchange="gerarRelatorio()">
<option value="dia">Por Dia</option>
<option value="mes">Por Mês</option>
<option value="ano">Por Ano</option>
</select>

<input type="date" id="filtroData" onchange="gerarRelatorio()">

<table>
<thead>
<tr><th>SKU</th><th>Quantidade Total</th></tr>
</thead>
<tbody id="relatorioTabela"></tbody>
</table>

</div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos"))||[];
let saidas = JSON.parse(localStorage.getItem("saidas"))||[];
let grafico;

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function salvarTudo(){
localStorage.setItem("produtos",JSON.stringify(produtos));
localStorage.setItem("saidas",JSON.stringify(saidas));
render();
renderSaidas();
}

function cadastrarProduto(e){
e.preventDefault();

let p={
sku:sku.value,
nome:nome.value,
cor:cor.value,
valor:parseFloat(valor.value),
quantidade:parseInt(quantidade.value),
rua:rua.value,
predio:predio.value,
andar:andar.value,
entrada:entrada.value,
saida:""
};

let existente = produtos.find(prod=>prod.sku===p.sku);
if(existente){
existente.quantidade+=p.quantidade;
}else{
produtos.push(p);
}

salvarTudo();
e.target.reset();
}

function registrarSaida(e){
e.preventDefault();

let sku = saidaSku.value;
let qtd = parseInt(saidaQuantidade.value);

let produto = produtos.find(p=>p.sku===sku);

if(!produto){ alert("SKU não encontrado"); return; }
if(produto.quantidade<qtd){ alert("Estoque insuficiente"); return; }

produto.quantidade-=qtd;
produto.saida=dataSaida.value;

saidas.push({
sku,
pedido:pedido.value,
transportadora:transportadora.value,
quantidade:qtd,
data:dataSaida.value
});

salvarTudo();
e.target.reset();
}

function render(){
listaProdutos.innerHTML="";
let totalQtd=0;
let totalValor=0;

produtos.forEach(p=>{
totalQtd+=p.quantidade;
totalValor+=p.quantidade*p.valor;

listaProdutos.innerHTML+=`
<tr>
<td>${p.sku}</td>
<td>${p.nome}</td>
<td>${p.cor}</td>
<td>${p.quantidade}</td>
<td>R$ ${p.valor}</td>
<td>${p.rua}</td>
<td>${p.predio}</td>
<td>${p.andar}</td>
<td>${p.entrada}</td>
<td>${p.saida||"-"}</td>
</tr>`;
});

totalProdutos.innerText=produtos.length;
totalQuantidade.innerText=totalQtd;
valorTotal.innerText="R$ "+totalValor.toFixed(2);

gerarGrafico();
}

function renderSaidas(){
listaSaidas.innerHTML="";
saidas.forEach(s=>{
listaSaidas.innerHTML+=`
<tr>
<td>${s.sku}</td>
<td>${s.pedido}</td>
<td>${s.transportadora}</td>
<td>${s.quantidade}</td>
<td>${s.data}</td>
</tr>`;
});
}

function gerarGrafico(){
if(grafico) grafico.destroy();

let meses=Array(12).fill(0);
produtos.forEach(p=>{
let mes=new Date(p.entrada).getMonth();
meses[mes]+=p.quantidade;
});

grafico=new Chart(graficoMensal,{
type:"bar",
data:{
labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[{label:"Entradas Mensais",data:meses,backgroundColor:"#22c55e"}]
}
});
}

function gerarRelatorio(){
let tipo=filtroTipo.value;
let data=new Date(filtroData.value);
relatorioTabela.innerHTML="";
let resumo={};

produtos.forEach(p=>{
let d=new Date(p.entrada);
if(!filtroData.value) return;

if(tipo==="dia" && d.toDateString()===data.toDateString())
resumo[p.sku]=(resumo[p.sku]||0)+p.quantidade;

if(tipo==="mes" && d.getMonth()===data.getMonth() && d.getFullYear()===data.getFullYear())
resumo[p.sku]=(resumo[p.sku]||0)+p.quantidade;

if(tipo==="ano" && d.getFullYear()===data.getFullYear())
resumo[p.sku]=(resumo[p.sku]||0)+p.quantidade;
});

for(let sku in resumo){
relatorioTabela.innerHTML+=`<tr><td>${sku}</td><td>${resumo[sku]}</td></tr>`;
}
}

function exportarExcel(){
let csv="SKU,Nome,Cor,Quantidade,Valor,Rua,Predio,Andar,Entrada\n";
produtos.forEach(p=>{
csv+=`${p.sku},${p.nome},${p.cor},${p.quantidade},${p.valor},${p.rua},${p.predio},${p.andar},${p.entrada}\n`;
});
downloadCSV(csv,"produtos_wms.csv");
}

function exportarSaidas(){
let csv="SKU,Pedido,Transportadora,Quantidade,Data\n";
saidas.forEach(s=>{
csv+=`${s.sku},${s.pedido},${s.transportadora},${s.quantidade},${s.data}\n`;
});
downloadCSV(csv,"saidas_wms.csv");
}

function downloadCSV(csv,filename){
let blob=new Blob([csv],{type:"text/csv"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download=filename;
link.click();
}

render();
renderSaidas();

</script>
</body>
</html>
