<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMS Logística PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--primary:#22c55e;
--secondary:#3b82f6;
--danger:#ef4444;
--text:#f1f5f9;
--muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{display:flex;background:var(--bg);color:var(--text);}

.sidebar{
width:250px;
background:var(--card);
height:100vh;
padding:25px;
position:fixed;
}

.sidebar h2{
color:var(--primary);
margin-bottom:25px;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
background:transparent;
border:1px solid var(--primary);
color:var(--text);
cursor:pointer;
border-radius:6px;
transition:.3s;
}

.sidebar button:hover{
background:var(--primary);
color:#000;
}

.main{
margin-left:250px;
padding:30px;
width:100%;
}

.section{display:none;}
.active{display:block;}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

.card h3{color:var(--muted);font-size:14px;}
.card p{font-size:22px;font-weight:bold;margin-top:8px;}

form{
background:var(--card);
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

input,select{
padding:8px;
border-radius:6px;
border:none;
}

button.submit{
background:var(--primary);
border:none;
padding:8px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button.blue{background:var(--secondary);}

table{
width:100%;
border-collapse:collapse;
background:var(--card);
margin-top:15px;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
text-align:center;
}

.chart-box{
background:var(--card);
padding:20px;
border-radius:12px;
margin-top:20px;
}

@media(max-width:768px){
.sidebar{position:relative;width:100%;height:auto;}
.main{margin-left:0;}
}
</style>
</head>
<body>

<div class="sidebar">
<h2>WMS PRO</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('entrada')">Entrada</button>
<button onclick="show('saida')">Saída</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('relatorio')">Relatórios</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h1>Dashboard Geral</h1>

<div class="cards">
<div class="card"><h3>Total SKUs</h3><p id="totalSkus">0</p></div>
<div class="card"><h3>Quantidade Total</h3><p id="totalQtd">0</p></div>
<div class="card"><h3>Valor Total Estoque</h3><p id="valorTotal">0</p></div>
<div class="card"><h3>Total Saídas</h3><p id="totalSaidas">0</p></div>
</div>

<div class="chart-box">
<canvas id="grafico"></canvas>
</div>
</div>

<!-- ENTRADA -->
<div id="entrada" class="section">
<h1>Entrada de Produto</h1>

<form onsubmit="registrarEntrada(event)">
<input type="text" id="sku" placeholder="SKU" required>
<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="cor" placeholder="Cor" required>
<input type="number" id="valor" placeholder="Valor Unitário" required>
<input type="number" id="quantidade" placeholder="Quantidade" required>
<input type="text" id="rua" placeholder="Rua" required>
<input type="text" id="predio" placeholder="Prédio" required>
<input type="text" id="andar" placeholder="Andar" required>
<input type="date" id="dataEntrada" required>
<button class="submit">Registrar Entrada</button>
</form>
</div>

<!-- SAÍDA -->
<div id="saida" class="section">
<h1>Saída de Produto</h1>

<form onsubmit="registrarSaida(event)">
<input type="text" id="skuSaida" placeholder="SKU" required>
<input type="number" id="qtdSaida" placeholder="Quantidade" required>
<input type="text" id="pedido" placeholder="Pedido" required>
<input type="text" id="transportadora" placeholder="Transportadora" required>
<input type="date" id="dataSaida" required>
<button class="submit">Registrar Saída</button>
</form>
</div>

<!-- ESTOQUE -->
<div id="estoque" class="section">
<h1>Estoque Atual</h1>
<table>
<thead>
<tr>
<th>SKU</th><th>Nome</th><th>Cor</th>
<th>Qtd</th><th>Valor</th>
<th>Endereço</th>
</tr>
</thead>
<tbody id="tabelaEstoque"></tbody>
</table>
<button class="submit blue" onclick="exportarEstoque()">Exportar Estoque Excel</button>
</div>

<!-- RELATÓRIO -->
<div id="relatorio" class="section">
<h1>Relatório Geral</h1>
<table>
<thead>
<tr>
<th>Tipo</th><th>SKU</th><th>Qtd</th><th>Data</th>
</tr>
</thead>
<tbody id="tabelaRelatorio"></tbody>
</table>
<button class="submit blue" onclick="exportarRelatorio()">Exportar Relatório Excel</button>
</div>

</div>

<script>

let estoque = JSON.parse(localStorage.getItem("estoque")) || [];
let historico = JSON.parse(localStorage.getItem("historico")) || [];
let grafico;

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function salvar(){
localStorage.setItem("estoque",JSON.stringify(estoque));
localStorage.setItem("historico",JSON.stringify(historico));
render();
}

function registrarEntrada(e){
e.preventDefault();

let sku=sku.value;
let existente=estoque.find(p=>p.sku===sku);

if(existente){
existente.quantidade+=parseInt(quantidade.value);
}else{
estoque.push({
sku:sku,
nome:nome.value,
cor:cor.value,
valor:parseFloat(valor.value),
quantidade:parseInt(quantidade.value),
endereco:`${rua.value}/${predio.value}/${andar.value}`
});
}

historico.push({tipo:"Entrada",sku:sku,qtd:parseInt(quantidade.value),data:dataEntrada.value});
salvar();
e.target.reset();
}

function registrarSaida(e){
e.preventDefault();

let produto=estoque.find(p=>p.sku===skuSaida.value);
if(!produto || produto.quantidade<qtdSaida.value){
alert("Estoque insuficiente ou SKU inexistente");
return;
}

produto.quantidade-=parseInt(qtdSaida.value);

historico.push({tipo:"Saída",sku:skuSaida.value,qtd:parseInt(qtdSaida.value),data:dataSaida.value});
salvar();
e.target.reset();
}

function render(){

let totalQtd=0,totalValor=0;

tabelaEstoque.innerHTML="";
estoque.forEach(p=>{
totalQtd+=p.quantidade;
totalValor+=p.quantidade*p.valor;

tabelaEstoque.innerHTML+=`
<tr>
<td>${p.sku}</td>
<td>${p.nome}</td>
<td>${p.cor}</td>
<td>${p.quantidade}</td>
<td>R$ ${p.valor}</td>
<td>${p.endereco}</td>
</tr>`;
});

tabelaRelatorio.innerHTML="";
historico.forEach(h=>{
tabelaRelatorio.innerHTML+=`
<tr>
<td>${h.tipo}</td>
<td>${h.sku}</td>
<td>${h.qtd}</td>
<td>${h.data}</td>
</tr>`;
});

totalSkus.innerText=estoque.length;
totalQtd.innerText=totalQtd;
valorTotal.innerText="R$ "+totalValor.toFixed(2);
totalSaidas.innerText=historico.filter(h=>h.tipo==="Saída").length;

gerarGrafico();
}

function gerarGrafico(){
if(grafico)grafico.destroy();

let entradas=historico.filter(h=>h.tipo==="Entrada").length;
let saidas=historico.filter(h=>h.tipo==="Saída").length;

grafico=new Chart(document.getElementById("grafico"),{
type:"doughnut",
data:{
labels:["Entradas","Saídas"],
datasets:[{data:[entradas,saidas],backgroundColor:["#22c55e","#ef4444"]}]
}
});
}

function exportarEstoque(){
let csv="SKU,Nome,Cor,Quantidade,Valor,Endereco\n";
estoque.forEach(p=>{
csv+=`${p.sku},${p.nome},${p.cor},${p.quantidade},${p.valor},${p.endereco}\n`;
});
download(csv,"estoque_wms.csv");
}

function exportarRelatorio(){
let csv="Tipo,SKU,Quantidade,Data\n";
historico.forEach(h=>{
csv+=`${h.tipo},${h.sku},${h.qtd},${h.data}\n`;
});
download(csv,"relatorio_wms.csv");
}

function download(csv,nome){
let blob=new Blob([csv],{type:"text/csv"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download=nome;
link.click();
}

render();

</script>
</body>
</html>
